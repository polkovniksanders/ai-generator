# Конфигурация для хостового nginx на VPS
# Этот файл НЕ входит в Docker — устанавливается на хост-машину
#
# Автоматическая установка (рекомендуется):
#   bash scripts/vps-setup.sh
#
# Ручная установка:
#   cp nginx-host.conf /etc/nginx/sites-available/generator.berghub.ru
#   ln -s /etc/nginx/sites-available/generator.berghub.ru /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d generator.berghub.ru

server {
    listen 80;
    server_name generator.berghub.ru;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name generator.berghub.ru;

    # SSL — certbot заполнит автоматически
    ssl_certificate /etc/letsencrypt/live/generator.berghub.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/generator.berghub.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Проксируем всё в контейнер (API + статика React)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
